services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Uncomment to use real OpenAI models; otherwise runs offline fallback.
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      EMBEDDING_MODEL: text-embedding-3-small
      GENERATION_MODEL: gpt-4.1-mini
      FAISS_INDEX_TYPE: flat
      DATA_DIR: /data
      API_KEYS: demo-key:demo
      LOG_LEVEL: INFO
    volumes:
      # Persist FAISS indices + docstore across restarts.
      - qasystem-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  qasystem-data:
